<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Footer</title>
  <link rel="stylesheet" href="footer.css" />
</head>
<body>

  <footer class="site-footer-gb">
    <div class="footer-links-gb">
      <h3>แบรนด์พันธมิตรของเรา</h3>
      <p class="footer-desc-gb">
        รวมเครือข่ายเว็บไซต์คุณภาพ เว็บตรงไม่เอเย่นต์ ที่ให้บริการเกมสล็อตออนไลน์และคาสิโนครบวงจร
        มั่นคง ปลอดภัย ทุกการใช้งาน
      </p>

      <!-- ✅ พับ/อ่านต่อ (สวย + ไม่ยาวเกินบนมือถือ) -->
      <details class="partner-acc">
        <summary class="partner-sum">
          <span>รายชื่อเว็บพันธมิตร</span>
          <span class="partner-badge">แตะเพื่อดูทั้งหมด</span>
        </summary>

        <div class="partner-panel">
          <ul class="partner-list">

            <!-- กลุ่มตัวอย่าง (ใส่ต่อได้เรื่อยๆ) -->

      

            <!-- ✅ วางลิงก์ที่เหลือทั้งหมดของคุณต่อท้ายในรูปแบบเดียวกันได้เลย -->

          </ul>
        </div>
      </details>

    </div>

    <p class="copy-gb">© 2025 ♠️ <span id="footer-domain">yourdomain.com</span> All rights reserved.</p>
  </footer>

  <!-- (ออปชัน) ถ้าคุณอยากให้แสดงโดเมนอัตโนมัติ -->
  <script>
    document.getElementById("footer-domain").textContent = window.location.hostname;
  </script>

</body>
</html>
